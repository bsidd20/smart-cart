[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E741"]   # short names like l/o/m are fine in tight numeric code

[tool.ruff.lint.per-file-ignores]
# scripts and tests insert the repo root on sys.path before importing app.*
"scripts/*" = ["E402"]
"tests/*" = ["E402"]
