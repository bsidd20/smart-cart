# One-command streaming stack. Host only needs Docker.
#
#   docker compose up --build              # Kafka + UI + topic-init + producer + Python consumer
#   docker compose --profile spark up --build   # also run the Spark Structured Streaming consumer
#
# Bronze output is written to ./data on the host. Kafka UI: http://localhost:8080
# Kafka runs in KRaft mode (no ZooKeeper); host clients use localhost:9092, containers
# use kafka:9094.
services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

  # Create topics with explicit partition counts, then exit.
  topic-init:
    image: bitnami/kafka:3.7
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists \
          --topic price-events --partitions 6 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9094 --create --if-not-exists \
          --topic price-events.dlq --partitions 3 --replication-factor 1
        echo "topics ready"

  # Python consumer (default engine): price-events -> Bronze Delta, bad records -> DLQ.
  consumer:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9094
    volumes:
      - ./data:/app/data
    command: ["python", "-m", "streaming.run_consumer"]

  # One-shot producer that feeds a batch of events (valid v1/v2, some bad -> DLQ).
  producer:
    build: .
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9094
    command: ["python", "-m", "streaming.produce_demo", "2000"]

  # Spark Structured Streaming consumer (production engine). Opt-in via the profile.
  spark-stream:
    image: bitnami/spark:3.5
    profiles: ["spark"]
    user: root
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./spark:/app/spark
      - ./data:/app/data
    environment:
      KAFKA_BOOTSTRAP: kafka:9094
    command: >
      spark-submit
      --packages io.delta:delta-spark_2.12:3.2.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
      --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
      /app/spark/stream_bronze.py
