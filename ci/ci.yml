name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-streaming.txt ruff pytest
      - name: Lint (ruff)
        run: |
          ruff check app scripts tests streaming spark
          ruff format --check app scripts tests streaming spark
      - name: Unit + integration tests
        run: pytest -q              # includes streaming logic tests (no broker needed)
      - name: Spark jobs compile (no JVM needed)
        run: python -m py_compile spark/stream_bronze.py spark/batch_silver.py
      - name: Scale simulation smoke (200k rows)
        run: python scripts/scale_simulation.py 200000 10 8

  dbt-build-and-test:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt dbt-duckdb
      - name: Build lakehouse from the committed real-data sample
        run: python scripts/ingest.py            # creates data/lake/bronze (offline)
      - name: dbt seed / build / test
        working-directory: transform
        env:
          SMARTCART_LAKE: ${{ github.workspace }}/data/lake
          SMARTCART_MARTS: ${{ github.workspace }}/data/lake/marts
          SMARTCART_DUCKDB: /tmp/smartcart_ci.duckdb
        run: |
          mkdir -p "$SMARTCART_MARTS"
          dbt seed --profiles-dir .
          dbt build --profiles-dir .   # runs models AND data tests; fails the job on any test failure
